<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spor? 💪🏼💪🏼💪🏼 </title>
    <style>
       body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            /* ARKA PLAN FÜME */
            background-color: #1a1a1a; 
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='30' font-size='20'%3E💪🏼%3C/text%3E%3C/svg%3E");
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            /* TABAN RENGİ (BİRAZ DAHA AÇIK FÜME) */
            background: rgba(40, 44, 52, 0.98); 
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            max-width: 450px;
            width: 85%;
            display: flex;
            flex-direction: column;
            align-items: center;
            backdrop-filter: blur(5px);
            /* KENAR ÇİZGİSİ (BELİRGİN SARI-LACİVERT ESİNTİLİ VEYA GÜMÜŞ) */
            border: 2px solid rgba(254, 221, 0, 0.5); 
        }

       h1 {
            font-size: 24px;
            color: #ffffff !important; /* !important ekleyerek rengi beyaza sabitliyoruz */
            min-height: 80px;
            margin: 10px 0;
            line-height: 1.3;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        }
        }
        img {
            width: 100%;
            max-width: 260px;
            height: 220px;
            object-fit: contain;
            border-radius: 20px;
            margin-bottom: 25px;
        }
        h1 {
            font-size: 24px;
            color: #002d72;
            min-height: 80px;
            margin: 10px 0;
            line-height: 1.3;
        }
        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 100%;
            margin-top: 10px;
            min-height: 100px;
        }
        button {
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        #yesBtn {
            background-color: #fedd00;
            color: #002d72;
            z-index: 100;
        }
        #noBtn {
            background-color: #002d72;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="question">Merhaba Senna , birlikte spor yapsak mı acabaa ? 🏋🏻💪🏻🏋🏻💪🏻</h1>
    <img id="anaGorsel" src="number5.gif">
    
    <div class="buttons">
        <button id="yesBtn" onclick="evet()">Evet!</button>
        <button id="noBtn" onclick="hayirBasildi()">Hayır</button>
    </div>
</div>

<script>
    // GÖRSELLERİ ÖNCEDEN YÜKLEME (PRELOAD)
    const gifListesi = ["number3.gif", "number4.gif", "number5.gif", "number6.gif", "number7.gif"];

    gifListesi.forEach(gif => {
        const img = new Image();
        img.src = gif;
    });
    let hamle = 0;
    let butonBoyutu = 1;
    let onaylandi = false; // Instagram yönlendirmesi için kontrol

    function evet() {
        if (!onaylandi) {
            // İlk tıklamada her şeyi değiştir
            document.getElementById('question').innerHTML = "Harika karar! O zaman haberleşiyoruz.";
            document.getElementById('anaGorsel').src = "number7.gif";
            document.getElementById('noBtn').style.display = 'none';
            document.getElementById('yesBtn').style.transform = "scale(1.1)";
            document.getElementById('yesBtn').innerHTML = " Cevabını buradan bekliyorum!";
            onaylandi = true;
        } else {
            // İkinci tıklamada Instagram'ı aç
            // BURAYA KENDİ KULLANICI ADINI YAZ (Örn: erenokutan)
            const instagramKullaniciAdi = "eren_okutan"; 
            window.location.href = "https://ig.me/m/" + instagramKullaniciAdi;
        }
    }

    function hayirBasildi() {
        hamle++;
        const evetButon = document.getElementById('yesBtn');
        const baslik = document.getElementById('question');
        const resim = document.getElementById('anaGorsel');

        butonBoyutu += 0.6; 
        evetButon.style.transform = "scale(" + butonBoyutu + ")";

        if (hamle === 1) {
            baslik.innerHTML = "Sırt çalışabiliriz ya da bacak";
            resim.src = "number4.gif";
        } 
        else if (hamle === 2) {
            baslik.innerHTML = "Çok eğlenceli olur sanki";
            resim.src = "number3.gif";
        }
        else if (hamle >= 3) {
            document.getElementById('noBtn').style.display = 'none';
            baslik.innerHTML = "Bence bu bir işaret, değerlendirelim mi ???";
            resim.src = "number6.gif";
            evetButon.style.transform = "scale(" + (butonBoyutu + 0.3) + ")";
        }
    }
</script>

</body>
</html>
